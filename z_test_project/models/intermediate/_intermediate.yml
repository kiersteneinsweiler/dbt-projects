version: 2

models:
  - name: int_crime_weather_joined
    description: "Crime records joined to daily weather data on reported date. Enriched with season, temperature bucket, and weekend flag. One row per crime incident."
    columns:
      - name: crime_id
        description: "Unique identifier for each crime incident"
        tests:
          - unique
          - not_null

      - name: reported_date
        description: "Date the crime was reported"
        tests:
          - not_null

      - name: season
        description: "Season derived from reported month"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Winter', 'Spring', 'Summer', 'Fall']

      - name: temp_bucket
        description: "Temperature range bucket derived from avg_temp_f"
        data_tests:
          - accepted_values:
              arguments:
                values: [
                  'Extreme Cold (< 20°F)',
                  'Cold (20-39°F)',
                  'Cool (40-59°F)',
                  'Warm (60-79°F)',
                  'Hot (80°F+)',
                  'Unknown'
              ]