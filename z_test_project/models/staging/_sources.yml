version: 2

sources:
  - name: chicago_crime
    database: bigquery-public-data
    schema: chicago_crime
    tables:
      - name: crime
        description: "Chicago crime reports from 2001 to present"

  - name: chicago_weather
    database: bigquery-public-data
    schema: noaa_gsod
    tables:
      - name: gsod2021
        description: "NOAA weather station daily summaries for 2021"
      - name: gsod2022
        description: "NOAA weather station daily summaries for 2022"
      - name: gsod2023
        description: "NOAA weather station daily summaries for 2023"