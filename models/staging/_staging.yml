version: 2

models:
  - name: stg_crimes
    description: "Cleaned and renamed Chicago crime reports from 2021 to present. One row per crime incident."
    columns:
      - name: crime_id
        description: "Unique identifier for each crime incident"
        data_tests:
          - unique
          - not_null

      - name: reported_date
        description: "Date the crime was reported"
        data_tests:
          - not_null

      - name: reported_year
        description: "Year the crime was reported"
        data_tests:
          - accepted_values:
              arguments: 
                values: [2021, 2022, 2023]
                quote: false

      - name: crime_type
        description: "Primary classification of the crime"
        data_tests:
          - not_null

      - name: arrest
        description: "Whether an arrest was made"
        data_tests:
          - not_null

  - name: stg_weather
    description: "Cleaned daily weather summaries for Chicago stations (O'Hare and Midway) from 2021-2023. One row per station per day."
    columns:
      - name: station_id
        description: "NOAA weather station identifier"
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['725300', '725340']

      - name: weather_date
        description: "Date of the weather reading"
        data_tests:
          - not_null

      - name: avg_temp_f
        description: "Average daily temperature in Fahrenheit"

      - name: precipitation_inches
        description: "Daily precipitation in inches"