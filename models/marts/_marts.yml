version: 2

models:
  - name: mart_crime_weather_summary
    description: "Final aggregated summary of Chicago crimes by year, month, season, temperature bucket, and crime type. Includes arrest rates, rolling 3-month crime totals, and weather conditions. One row per unique combination of dimensions."
    columns:
      - name: reported_year
        description: "Year of the crime reports"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2021, 2022, 2023]
                quote: false

      - name: reported_month
        description: "Month of the crime reports"
        data_tests:
          - not_null

      - name: season
        description: "Season derived from reported month"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Winter', 'Spring', 'Summer', 'Fall']

      - name: total_crimes
        description: "Total number of crimes for this dimension combination"
        data_tests:
          - not_null

      - name: arrest_rate_pct
        description: "Percentage of crimes that resulted in an arrest"

      - name: rolling_3mo_crimes
        description: "Rolling 3-month total crimes for this crime type within the year"

      - name: crime_type_rank
        description: "Rank of crime type by volume within each year, 1 being most common"